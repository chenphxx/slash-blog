<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/notes.css">
    <!-- vditor 支持markdown编辑 -->
    <link rel="stylesheet" href="../node_modules/vditor/dist/index.css">

    <title>chenphxx's notes</title>
</head>

<body>
        <!-- Container for Vditor -->
        <div id="vditor" style="height: 500px; background-color: #5062b1;"></div>
        <!-- 引入 Vditor JS -->
        <script src="../node_modules/vditor/dist/index.min.js"></script>
        <!-- 初始化 Vditor -->
        <script>
            // 初始化 Vditor
            const vditor = new Vditor
            (
                'vditor',
                {
                    height: 1000, // 设置编辑器高度
                    toolbar: ['emoji', 'bold', 'italic', '|', 'list', 'link', 'code'],  // 工具栏功能
                    mode: 'ir', // 编辑模式: sv (分屏预览), ir (即时渲染), wysiwyg (所见即所得)
                    preview:
                    {
                        markdown:
                        {
                            toc: true, // 支持目录
                        }
                    }
                }
            );
        </script>
</body>

</html>
